<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Agent Theodore IA</title>
    <meta name="theme-color" content="#0e0e12">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Theodore IA">
    <link rel="manifest" id="pwa-manifest">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
        body { background:#0a0a10; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif; height:100vh; height:100dvh; display:flex; color:#e3e3e3; overflow:hidden; user-select:none; }
        #sidebar { width:280px; background:#0f0f18; border-right:1px solid #1e1e2e; display:flex; flex-direction:column; z-index:100; }
        .sidebar-profile { padding:20px 15px; border-bottom:1px solid #1e1e2e; display:flex; align-items:center; gap:12px; background:linear-gradient(135deg,#0f0f18,#1a1a2e); }
        .profile-avatar { width:44px; height:44px; background:linear-gradient(135deg,#00d4ff,#7c3aed); border-radius:12px; display:flex; align-items:center; justify-content:center; font-size:14px; font-weight:900; color:white; letter-spacing:-1px; box-shadow:0 4px 15px #00d4ff33; flex-shrink:0; }
        .profile-info h3 { color:#fff; font-size:14px; font-weight:700; }
        .profile-info p { color:#00ff88; font-size:10px; margin-top:2px; }
        #sidebar h2 { color:#555; padding:15px 20px 8px; font-size:10px; text-transform:uppercase; letter-spacing:2px; font-weight:700; }
        #historique { flex:1; overflow-y:auto; padding:0 10px; -webkit-overflow-scrolling:touch; }
        .session { padding:10px 12px; margin:3px 0; border-radius:10px; cursor:pointer; color:#888; font-size:13px; transition:all 0.2s; display:flex; align-items:center; gap:8px; }
        .session:hover,.session:active { background:#1a1a2e; color:#fff; }
        .sess-icon { font-size:14px; flex-shrink:0; }
        .sess-content { flex:1; overflow:hidden; }
        .sess-title { white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
        .sess-date { font-size:10px; color:#333; margin-top:1px; }
        #memoire-section { padding:8px 10px; border-top:1px solid #1e1e2e; max-height:150px; overflow-y:auto; }
        #memoire-section h3 { color:#00ff88; font-size:10px; text-transform:uppercase; letter-spacing:1.5px; margin-bottom:6px; padding:0 5px; }
        .mem-item { background:#0a0a14; padding:7px 10px; border-radius:8px; margin-bottom:4px; font-size:11px; color:#666; display:flex; justify-content:space-between; align-items:center; border:1px solid #1e1e2e; }
        .mem-del { color:#ff4a4a; cursor:pointer; font-size:12px; flex-shrink:0; margin-left:6px; }
        .sidebar-bottom { padding:8px 10px; padding-bottom:env(safe-area-inset-bottom,10px); display:flex; flex-direction:column; gap:6px; border-top:1px solid #1e1e2e; }
        .btn-action { border:none; padding:11px; border-radius:10px; cursor:pointer; font-weight:600; font-size:13px; transition:all 0.2s; text-align:center; width:100%; display:flex; align-items:center; justify-content:center; gap:6px; }
        #install-app-btn { background:#7c3aed; color:white; display:none; }
        #android-btn { background:#1a2e1a; color:#00ff88; border:1px solid #00ff8833; }
        #new-chat { background:#0a1a2e; color:#00d4ff; border:1px solid #00d4ff33; }
        #download-btn { background:#1a1a2e; color:#888; border:1px solid #2e2e38; }
        #main { flex:1; display:flex; flex-direction:column; background:#0a0a10; position:relative; overflow:hidden; }
        #header { background:rgba(10,10,16,0.95); backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px); padding:12px 16px; padding-top:max(12px,env(safe-area-inset-top)); display:flex; align-items:center; justify-content:space-between; border-bottom:1px solid #1e1e2e; }
        .header-left { display:flex; align-items:center; gap:12px; }
        #menu-toggle { background:transparent; border:none; color:#888; font-size:20px; cursor:pointer; width:38px; height:38px; border-radius:8px; display:flex; align-items:center; justify-content:center; }
        #menu-toggle:active { background:#1a1a2e; }
        .header-ai-avatar { width:38px; height:38px; background:linear-gradient(135deg,#00d4ff,#7c3aed); border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:900; color:white; position:relative; animation:glowPulse 3s infinite; }
        @keyframes glowPulse { 0%,100%{box-shadow:0 0 8px #00d4ff44} 50%{box-shadow:0 0 20px #00d4ff88,0 0 40px #7c3aed44} }
        .dot-live { position:absolute; bottom:-2px; right:-2px; width:10px; height:10px; background:#00ff88; border-radius:50%; border:2px solid #0a0a10; animation:blink 2s infinite; }
        @keyframes blink { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.5;transform:scale(0.8)} }
        .header-info h1 { color:#fff; font-size:16px; font-weight:700; }
        .header-info p { color:#555; font-size:10px; margin-top:1px; }
        .badge-pro { background:linear-gradient(135deg,#7c3aed,#00d4ff); color:white; padding:4px 10px; border-radius:20px; font-size:10px; font-weight:700; }
        #sidebar-overlay { display:none; position:absolute; inset:0; background:rgba(0,0,0,0.7); z-index:90; backdrop-filter:blur(4px); }
        #messages { flex:1; overflow-y:auto; padding:16px; display:flex; flex-direction:column; gap:16px; -webkit-overflow-scrolling:touch; user-select:text; -webkit-user-select:text; }
        .msg-user { align-self:flex-end; max-width:82%; }
        .msg-bot { align-self:flex-start; max-width:100%; display:flex; gap:10px; align-items:flex-start; width:100%; }
        .ia-avatar { width:34px; height:34px; background:linear-gradient(135deg,#00d4ff,#7c3aed); border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:11px; font-weight:900; color:white; flex-shrink:0; box-shadow:0 4px 12px #00d4ff33; }
        .ia-avatar-img { width:34px; height:34px; background:linear-gradient(135deg,#7c3aed,#00d4ff); border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:900; color:white; flex-shrink:0; }
        .bubble-user { background:linear-gradient(135deg,#1a1a3e,#0f0f28); color:#f3f4f6; padding:12px 16px; border-radius:18px 18px 4px 18px; font-size:15px; line-height:1.6; border:1px solid #2e2e4e; }
        .bot-content-wrapper { display:flex; flex-direction:column; gap:8px; flex:1; overflow:hidden; }
        .thought-block { background:#0f0f18; border-left:2px solid #7c3aed; padding:8px 12px; border-radius:8px; font-size:12px; color:#666; }
        .thought-block summary { cursor:pointer; font-weight:600; color:#7c3aed; outline:none; font-size:12px; }
        .bubble-bot { color:#e3e3e3; font-size:15px; line-height:1.65; width:100%; }
        .bubble-bot p { margin-bottom:8px; }
        .bubble-bot p:last-child { margin-bottom:0; }
        .bubble-bot pre { background:#0f0f18; padding:12px; border-radius:8px; overflow-x:auto; margin:10px 0; border:1px solid #1e1e2e; font-size:13px; }
        .bubble-bot code { background:#1a1a2e; padding:2px 5px; border-radius:4px; font-family:monospace; font-size:12px; color:#00d4ff; }
        .bubble-bot h1,.bubble-bot h2,.bubble-bot h3 { color:#00d4ff; margin:12px 0 6px; }
        .bubble-bot ul,.bubble-bot ol { padding-left:20px; margin-bottom:8px; }
        .bubble-bot li { margin-bottom:4px; }
        .msg-time { font-size:10px; color:#333; margin-top:3px; }
        .gen-img-container { display:flex; flex-direction:column; gap:8px; }
        .gen-img { max-width:100%; border-radius:12px; box-shadow:0 8px 30px #00d4ff11; border:1px solid #1e1e2e; cursor:pointer; }
        .gen-img-label { font-size:11px; color:#7c3aed; display:flex; align-items:center; gap:5px; font-weight:600; }
        .download-img { background:#0f0f18; border:1px solid #2e2e38; color:#00d4ff; padding:6px 12px; border-radius:8px; font-size:12px; text-decoration:none; display:inline-block; }
        .analyzed-img { max-width:180px; border-radius:10px; margin-bottom:6px; }
        #typing { display:none; padding:0 16px 8px; align-items:center; gap:10px; }
        .typing-dots { display:flex; gap:4px; }
        .d { width:6px; height:6px; background:#00d4ff; border-radius:50%; animation:bounce 1.4s infinite; }
        .d:nth-child(2){animation-delay:0.2s} .d:nth-child(3){animation-delay:0.4s}
        @keyframes bounce{0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-6px)}}
        .typing-text { color:#444; font-size:12px; font-style:italic; }
        #input-container { padding:8px 16px; padding-bottom:max(12px,env(safe-area-inset-bottom)); background:#0a0a10; border-top:1px solid #1e1e2e; }
        #input-zone { background:#0f0f18; border-radius:16px; padding:6px 12px; display:flex; flex-direction:column; gap:4px; border:1px solid #1e1e2e; transition:border-color 0.2s; }
        #input-zone:focus-within { border-color:#00d4ff33; }
        #file-preview-area { display:none; flex-wrap:wrap; gap:6px; padding:4px 0; }
        .preview-badge { background:#1a1a2e; color:#00d4ff; padding:4px 10px; border-radius:8px; font-size:11px; display:flex; align-items:center; gap:5px; border:1px solid #2e2e4e; }
        .preview-badge span { cursor:pointer; color:#ff4a4a; }
        .input-row { display:flex; align-items:center; gap:6px; }
        #msg-input { flex:1; padding:10px 4px; border:none; background:transparent; color:#e3e3e3; font-size:15px; outline:none; user-select:text; -webkit-user-select:text; }
        #msg-input::placeholder { color:#333; }
        .input-btn { background:transparent; border:none; color:#555; width:38px; height:38px; border-radius:8px; cursor:pointer; display:flex; align-items:center; justify-content:center; font-size:18px; flex-shrink:0; transition:all 0.2s; }
        .input-btn:active { background:#1a1a2e; color:#fff; }
        #send-btn { background:linear-gradient(135deg,#00d4ff,#7c3aed); color:white; border-radius:10px; width:36px; height:36px; font-size:16px; }
        #file-input { display:none; }
        ::-webkit-scrollbar{width:2px} ::-webkit-scrollbar-thumb{background:#1e1e2e;border-radius:2px}
        @media(max-width:900px){
            body{flex-direction:column;}
            #sidebar{position:absolute;top:0;left:0;bottom:0;transform:translateX(-100%);transition:transform 0.3s cubic-bezier(0.4,0,0.2,1);padding-top:env(safe-area-inset-top,0);}
            #sidebar.open{transform:translateX(0);}
            #sidebar.open~#sidebar-overlay{display:block;}
        }
        @media(min-width:901px){
            #menu-toggle{display:none;}
            #messages{padding:20px 10%;}
            #input-container{padding:8px 10% 20px;}
        }
    </style>
</head>
<body>
 
<div id="sidebar">
    <div class="sidebar-profile">
        <div class="profile-avatar">IA</div>
        <div class="profile-info">
            <h3>Agent Theodore</h3>
            <p>● Intelligence Artificielle Active</p>
        </div>
    </div>
    <h2>Discussions</h2>
    <div id="historique"></div>
    <div id="memoire-section">
        <h3>🧠 Mémoire</h3>
        <div id="memoire-list"></div>
    </div>
    <div class="sidebar-bottom">
        <button id="install-app-btn" class="btn-action" onclick="declencherInstall()">📲 Installer PWA</button>
        <button id="android-btn" class="btn-action" onclick="installerAndroid()">🤖 Installer Android</button>
        <button id="new-chat" class="btn-action" onclick="nouvelleConversation();fermerSidebar();">+ Nouveau Chat</button>
        <button id="download-btn" class="btn-action" onclick="telecharger()">📥 Télécharger</button>
    </div>
</div>
 
<div id="sidebar-overlay" onclick="fermerSidebar()"></div>
 
<div id="main">
    <div id="header">
        <div class="header-left">
            <button id="menu-toggle" onclick="toggleSidebar()">☰</button>
            <div class="header-ai-avatar">IA<div class="dot-live"></div></div>
            <div class="header-info">
                <h1>Agent Theodore</h1>
                <p>Vision · Génération · Mémoire</p>
            </div>
        </div>
        <div class="badge-pro">PRO</div>
    </div>
 
    <div id="messages"></div>
 
    <div id="typing">
        <div class="ia-avatar">IA</div>
        <div class="typing-dots"><div class="d"></div><div class="d"></div><div class="d"></div></div>
        <span class="typing-text" id="typing-text">Theodore analyse...</span>
    </div>
 
    <div id="input-container">
        <div id="input-zone">
            <div id="file-preview-area"></div>
            <div class="input-row">
                <button class="input-btn" title="Photo" onclick="document.getElementById('file-input').click()">📷</button>
                <input type="file" id="file-input" onchange="gererFichier(this)" accept="image/*">
                <input id="msg-input" type="text" placeholder="Posez votre question..." inputmode="text">
                <button id="send-btn" class="input-btn" onclick="envoyer()">➤</button>
            </div>
        </div>
    </div>
</div>
 
<script>
    // ===== CONFIG =====
    const GROQ_KEY = "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";
 
    // ===== DOM =====
    const msgDiv = document.getElementById('messages');
    const input  = document.getElementById('msg-input');
    const typing = document.getElementById('typing');
    const typingText = document.getElementById('typing-text');
    const sidebar = document.getElementById('sidebar');
 
    // ===== STATE =====
    let historique = [];
    let sessions   = JSON.parse(localStorage.getItem('theo_sessions') || '[]');
    let memoire    = JSON.parse(localStorage.getItem('theo_memoire')  || '[]');
    let fichierJoint  = null;
    let fichierBase64 = null;
    let isLoading = false;
 
    // ===== UTILS =====
    marked.setOptions({ gfm:true, breaks:true });
    const heure = () => new Date().toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'});
    const toggleSidebar  = () => sidebar.classList.toggle('open');
    const fermerSidebar  = () => sidebar.classList.remove('open');
 
    function telecharger(){
        const b = new Blob([`<!DOCTYPE html>\n${document.documentElement.outerHTML}`],{type:'text/html'});
        const a = document.createElement('a'); a.href=URL.createObjectURL(b); a.download='Agent_Theodore_IA.html'; a.click();
    }
 
    // ===== MEMOIRE =====
    function afficherMemoire(){
        const el = document.getElementById('memoire-list');
        el.innerHTML = memoire.length===0
            ? '<div style="color:#333;font-size:11px;padding:4px">Aucun souvenir</div>'
            : memoire.map((m,i)=>`<div class="mem-item">💾 ${m.substring(0,28)}... <span class="mem-del" onclick="supprimerMemoire(${i})">✕</span></div>`).join('');
    }
    function supprimerMemoire(i){
        memoire.splice(i,1);
        localStorage.setItem('theo_memoire',JSON.stringify(memoire));
        afficherMemoire();
    }
    function extraireMemoire(t){
        const mots=["je m'appelle","mon nom est","j'habite","je travaille","je suis","my name is","i am","i live"];
        if(mots.some(m=>t.toLowerCase().includes(m))){
            memoire.push(t.substring(0,60));
            if(memoire.length>20) memoire.shift();
            localStorage.setItem('theo_memoire',JSON.stringify(memoire));
            afficherMemoire();
        }
    }
    function contexteMemoire(){
        return memoire.length===0 ? '' : `\n\nMÉMOIRE:\n${memoire.map(m=>'- '+m).join('\n')}`;
    }
 
    // ===== SESSIONS =====
    function afficherSessions(){
        const h = document.getElementById('historique');
        h.innerHTML = sessions.slice().reverse().map((s,i)=>{
            const idx = sessions.length-1-i;
            return `<div class="session" onclick="chargerSession(${idx});fermerSidebar();"><span class="sess-icon">💬</span><div class="sess-content"><div class="sess-title">${s.titre}</div><div class="sess-date">${s.date||''}</div></div></div>`;
        }).join('');
    }
    function chargerSession(i){
        historique = sessions[i].messages;
        msgDiv.innerHTML = '';
        historique.forEach(m=>{
            if(m.role==='user')      addUser(m.content);
            if(m.role==='assistant') addBot(m.content);
        });
        msgDiv.scrollTop = msgDiv.scrollHeight;
    }
    function nouvelleConversation(){
        if(historique.length>0){
            const p = historique.find(m=>m.role==='user');
            sessions.push({titre:p?p.content.substring(0,25)+'...':'Discussion',date:new Date().toLocaleDateString('fr-FR'),messages:historique});
            localStorage.setItem('theo_sessions',JSON.stringify(sessions));
            afficherSessions();
        }
        historique=[]; msgDiv.innerHTML='';
        addBot("Nouvelle conversation ! Je suis prêt. 🚀");
    }
    function sauvegarderSession(texte){
        if(historique.length===2){
            sessions.push({titre:texte.substring(0,25)+'...',date:new Date().toLocaleDateString('fr-FR'),messages:historique});
            localStorage.setItem('theo_sessions',JSON.stringify(sessions));
            afficherSessions();
        } else if(sessions.length>0){
            sessions[sessions.length-1].messages = historique;
            localStorage.setItem('theo_sessions',JSON.stringify(sessions));
        }
    }
 
    // ===== AFFICHAGE =====
    function addUser(texte){
        msgDiv.innerHTML += `<div class="msg-user"><div class="bubble-user">${texte}</div><div class="msg-time">${heure()}</div></div>`;
        msgDiv.scrollTop = msgDiv.scrollHeight;
    }
    function addBot(contenu){
        let pensee='', rep=contenu;
        if(contenu.includes('<thought>')&&contenu.includes('</thought>')){
            pensee = contenu.split('</thought>')[0].replace('<thought>','').trim();
            rep    = contenu.split('</thought>')[1].trim();
        }
        const id='w'+Date.now()+Math.random().toString(36).substr(2,3);
        msgDiv.innerHTML += `<div class="msg-bot"><div class="ia-avatar">IA</div><div class="bot-content-wrapper" id="${id}"></div></div>`;
        const w = document.getElementById(id);
        if(pensee) w.innerHTML += `<details class="thought-block"><summary>🧠 Raisonnement</summary><div>${marked.parse(pensee)}</div></details>`;
        w.innerHTML += `<div class="bubble-bot">${marked.parse(rep)}</div><div class="msg-time">${heure()}</div>`;
        msgDiv.scrollTop = msgDiv.scrollHeight;
    }
    function addImageGeneree(prompt, url){
        msgDiv.innerHTML += `
        <div class="msg-bot">
            <div class="ia-avatar-img">🎨</div>
            <div class="bot-content-wrapper">
                <div class="gen-img-container">
                    <div class="gen-img-label">✦ Image générée par IA</div>
                    <img class="gen-img" src="${url}" alt="${prompt}" onclick="window.open('${url}','_blank')" loading="lazy">
                    <a class="download-img" href="${url}" download="theodore-ia.png" target="_blank">⬇ Télécharger</a>
                </div>
                <div class="msg-time">${heure()}</div>
            </div>
        </div>`;
        msgDiv.scrollTop = msgDiv.scrollHeight;
    }
 
    // ===== GENERATION IMAGE =====
    function detecterGenerationImage(t){
        return ['génère','generez','génerer','create','generate','dessine','crée une image','imagine','fais une image','make an image','draw'].some(m=>t.toLowerCase().includes(m));
    }
    async function genererImage(prompt){
        if(isLoading) return;
        isLoading = true;
        typingText.innerText = "🎨 Génération de l'image...";
        typing.style.display = 'flex';
        const propre = prompt.replace(/génère|générer|dessine|crée une image|imagine|fais une image|generate|create|draw|peins/gi,'').trim();
        const enc = encodeURIComponent(propre+', professional, ultra realistic, 8k, highly detailed');
        const url = `https://image.pollinations.ai/prompt/${enc}?width=1024&height=1024&nologo=true&model=flux`;
        typing.style.display = 'none';
        addUser(prompt);
        addImageGeneree(propre, url);
        historique.push({role:'user',content:prompt});
        historique.push({role:'assistant',content:`[Image générée: ${propre}]`});
        sauvegarderSession(prompt);
        isLoading = false;
    }
 
    // ===== ANALYSE IMAGE (GROQ VISION) =====
    async function analyserImage(texte, b64, mimeType){
        if(isLoading) return;
        isLoading = true;
        typingText.innerText = "📸 Analyse de l'image...";
        typing.style.display = 'flex';
 
        try {
            // Groq vision avec le bon format - image_url inline data
            const payload = {
                model: 'meta-llama/llama-4-scout-17b-16e-instruct',
                messages: [{
                    role: 'user',
                    content: [
                        {
                            type: 'text',
                            text: texte
                                ? texte
                                : "Analyse cette image en détail. Décris tout ce que tu vois : les objets, personnes, couleurs, texte visible, ambiance, style, composition. Sois précis et complet."
                        },
                        {
                            type: 'image_url',
                            image_url: {
                                url: `data:${mimeType};base64,${b64}`
                            }
                        }
                    ]
                }],
                max_tokens: 1500,
                temperature: 0.5
            };
 
            const res = await fetch('https://api.groq.com/openai/v1/chat/completions', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${GROQ_KEY}`
                },
                body: JSON.stringify(payload)
            });
 
            const data = await res.json();
            typing.style.display = 'none';
 
            if(data.error){
                console.error('Groq vision error:', data.error);
                addBot("⚠️ Erreur: " + (data.error.message || JSON.stringify(data.error)));
            } else if(data.choices?.[0]?.message?.content){
                const rep = data.choices[0].message.content;
                historique.push({role:'user', content: texte || 'Analyse cette image'});
                historique.push({role:'assistant', content: rep});
                addBot(rep);
                sauvegarderSession(texte || 'Analyse image');
            } else {
                addBot("❌ Pas de réponse reçue.");
            }
        } catch(e){
            typing.style.display = 'none';
            console.error('Erreur fetch:', e);
            addBot("❌ Erreur réseau: " + e.message);
        }
        isLoading = false;
    }
 
    // ===== GESTION FICHIER =====
    function gererFichier(inp){
        if(!inp.files?.[0]) return;
        const file = inp.files[0];
        if(!file.type.startsWith('image/')){alert('❌ Image uniquement!'); return;}
        if(file.size > 4*1024*1024){alert('❌ Max 4MB'); return;}
        fichierJoint = file;
        const reader = new FileReader();
        reader.onload = e => {
            fichierBase64 = e.target.result;
            const prev = document.getElementById('file-preview-area');
            prev.innerHTML = `<div class="preview-badge">🖼️ ${file.name.substring(0,18)} <span onclick="retirerFichier()">✕</span></div>`;
            prev.style.display = 'flex';
        };
        reader.readAsDataURL(file);
    }
    function retirerFichier(){
        fichierJoint=null; fichierBase64=null;
        document.getElementById('file-input').value='';
        document.getElementById('file-preview-area').style.display='none';
    }
 
    // ===== ENVOYER =====
    async function envoyer(){
        const texte = input.value.trim();
        if(!texte && !fichierJoint) return;
        if(isLoading) return;
        input.value='';
 
        // Image uploadée
        if(fichierJoint && fichierBase64){
            const b64  = fichierBase64.includes(',') ? fichierBase64.split(',')[1] : fichierBase64;
            const mime = fichierJoint.type || 'image/jpeg';
            msgDiv.innerHTML += `<div class="msg-user"><div class="bubble-user"><img class="analyzed-img" src="${fichierBase64}"><br>${texte||'Analyse cette image'}</div><div class="msg-time">${heure()}</div></div>`;
            msgDiv.scrollTop = msgDiv.scrollHeight;
            retirerFichier();
            await analyserImage(texte, b64, mime);
            return;
        }
 
        // Génération image
        if(detecterGenerationImage(texte)){
            await genererImage(texte);
            return;
        }
 
        // Chat normal (Groq llama-3.3-70b)
        extraireMemoire(texte);
        addUser(texte);
        historique.push({role:'user', content:texte});
        typingText.innerText = 'Theodore réfléchit...';
        typing.style.display = 'flex';
        isLoading = true;
 
        try {
            const res = await fetch('https://api.groq.com/openai/v1/chat/completions',{
                method: 'POST',
                headers: {'Content-Type':'application/json','Authorization':`Bearer ${GROQ_KEY}`},
                body: JSON.stringify({
                    model: 'llama-3.3-70b-versatile',
                    messages: [
                        {
                            role: 'system',
                            content: `Tu es l'Agent Theodore, une intelligence artificielle de prestige créée par l'ingénieur burundais Theodore Nahano. Tu es extrêmement intelligent, polyglotte, élégant et expert dans tous les domaines. Réponds dans la langue de ton interlocuteur. Sois bref, clair et précis.${contexteMemoire()}`
                        },
                        ...historique
                    ],
                    max_tokens: 2000,
                    temperature: 0.65
                })
            });
            const data = await res.json();
            if(data.error){
                addBot("⚠️ " + (data.error.message || "Erreur API"));
            } else if(data.choices?.[0]?.message?.content){
                const rep = data.choices[0].message.content;
                historique.push({role:'assistant', content:rep});
                addBot(rep);
                sauvegarderSession(texte);
            } else {
                addBot("❌ Pas de réponse. Réessaie.");
            }
        } catch(e){
            addBot("❌ Erreur réseau: " + e.message);
        }
        typing.style.display = 'none';
        isLoading = false;
    }
 
    // ===== PWA =====
    const manifestObj = {name:"Agent Theodore IA",short_name:"Theodore IA",start_url:window.location.origin+window.location.pathname,display:"standalone",background_color:"#0a0a10",theme_color:"#0a0a10",icons:[{src:"data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 rx=%2220%22 fill=%22%230f0f18%22/><text y=%22.75em%22 x=%228%22 font-size=%2255%22 font-weight=%22900%22 fill=%22%2300d4ff%22>IA</text></svg>",sizes:"192x192",type:"image/svg+xml"}]};
    document.getElementById('pwa-manifest').href = "data:application/manifest+json,"+encodeURIComponent(JSON.stringify(manifestObj));
    let installPrompt = null;
    window.addEventListener('beforeinstallprompt', e=>{ e.preventDefault(); installPrompt=e; document.getElementById('install-app-btn').style.display='flex'; });
    function declencherInstall(){ if(installPrompt){ installPrompt.prompt(); installPrompt.userChoice.then(r=>{ if(r.outcome==='accepted') document.getElementById('install-app-btn').style.display='none'; installPrompt=null; }); } }
    function installerAndroid(){
        const lien = window.location.href;
        navigator.clipboard.writeText(lien).then(()=>{ alert('✅ Lien copié!\n\nSur Android:\n1. Chrome\n2. Colle le lien\n3. Menu ⋮ → Ajouter à accueil'); }).catch(()=>{ alert('Lien: '+lien); });
    }
 
    // ===== INIT =====
    input.addEventListener('keypress', e=>{ if(e.key==='Enter') envoyer(); });
    afficherSessions();
    afficherMemoire();
    addBot(`Bonjour ! Je suis **l'Agent Theodore** — Intelligence Artificielle de Nouvelle Génération. 🚀
 
**Mes capacités :**
- 💬 Répondre à toutes vos questions
- 📷 Analyser des photos avec précision
- 🎨 Générer des images professionnelles
- 🧠 Mémoriser vos informations personnelles
- 📄 Rédiger des documents jusqu'à 30 pages
- 🌍 Communiquer dans toutes les langues
 
Comment puis-je vous aider aujourd'hui ?`);
</script>
